<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <meta name="theme-color" content="#9933CC" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="cook_now" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="application-name" content="cook_now" />
        <meta name="apple-touch-fullscreen" content="yes" />
        <meta name="msapplication-navbutton-color" content="#9933CC" />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" type="image/svg+xml" sizes="any" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%239933CC'/%3E%3Ctext x='32' y='44' font-size='36' text-anchor='middle' fill='white'%3E🍽%3C/text%3E%3C/svg%3E" />
        <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%239933CC'/%3E%3Ctext x='90' y='120' font-size='90' text-anchor='middle' fill='white'%3E🍽%3C/text%3E%3C/svg%3E" />
        <title>cook_now</title>
        <style>
            :root {
                --primary: #9933CC;
                --primary-dim: rgba(153, 51, 204, 0.15);
                --bg: #f2f2f7;
                --card: rgba(255, 255, 255, 0.95);
                --text: #1c1c1e;
                --gray: #8e8e93;
                --danger: #ff3b30;
                --glass-blur: 20px;
                --glass-tint: rgba(255, 255, 255, 0.1);
                --nav-bg: rgba(255, 255, 255, 0.15);
                --nav-border: rgba(255, 255, 255, 0.3);
                --nav-shadow: rgba(0, 0, 0, 0.1);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #000000;
                    --card: rgba(30, 30, 30, 0.95);
                    --text: #f5f5f7;
                    --gray: #8e8e93;
                    --glass-tint: rgba(0, 0, 0, 0.2);
                    --nav-bg: rgba(30, 30, 30, 0.35);
                    --nav-border: rgba(255, 255, 255, 0.08);
                    --nav-shadow: rgba(0, 0, 0, 0.3);
                }
            }

            html.dark-mode {
                --bg: #000000;
                --card: rgba(30, 30, 30, 0.95);
                --text: #f5f5f7;
                --glass-tint: rgba(0, 0, 0, 0.2);
                --nav-bg: rgba(30, 30, 30, 0.35);
                --nav-border: rgba(255, 255, 255, 0.08);
                --nav-shadow: rgba(0, 0, 0, 0.3);
            }

            html.light-mode {
                --bg: #f2f2f7;
                --card: rgba(255, 255, 255, 0.95);
                --text: #1c1c1e;
                --glass-tint: rgba(255, 255, 255, 0.1);
                --nav-bg: rgba(255, 255, 255, 0.35);
                --nav-border: rgba(255, 255, 255, 0.3);
                --nav-shadow: rgba(0, 0, 0, 0.1);
            }

            * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

            body {
                font-family: -apple-system, system-ui, sans-serif;
                background: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 0 0 100px 0;
                transition: background 0.3s, color 0.3s;
                min-height: 100dvh;
                overflow-x: hidden;
            }

            @media (min-width: 1024px) {
                body { padding: 0 0 0 280px; }
            }

            .container {
                padding: 15px;
                max-width: 500px;
                margin: auto;
            }

            @media (min-width: 1024px) {
                .container { max-width: 800px; padding: 24px 40px; }
            }

            .hidden { display: none !important; }

            .view {
                animation: fadeIn 0.4s ease-out;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* === LIQUID GLASS NAV === */
            .liquid-nav {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                align-items: center;
                background: var(--nav-bg);
                backdrop-filter: blur(40px) saturate(150%);
                -webkit-backdrop-filter: blur(40px) saturate(150%);
                border: 1px solid var(--nav-border);
                border-radius: 26px;
                z-index: 1000;
                padding: 4px 6px;
                box-shadow: none;
                max-width: 340px;
                width: calc(100% - 48px);
                animation: navSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            }

    .nav-pill {
        position: absolute;
        top: 2px;
        bottom: 2px;
        width: 0;
        background: rgba(255,255,255,0.08);
        border-radius: 22px;
        pointer-events: none;
        z-index: 0;
        transition: transform 0.3s ease, width 0.3s ease;
    }

    .nav-tabs {
        display: flex;
        flex: 1;
        align-items: center;
        position: relative;
        gap: 0;
    }

            @keyframes navSlideUp {
                from { transform: translateX(-50%) translateY(120px); opacity: 0; }
                to { transform: translateX(-50%) translateY(0); opacity: 1; }
            }

            @media (min-width: 1024px) {
                .liquid-nav { display: none; }
            }

    .nav-item {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--gray);
        cursor: pointer;
        padding: 6px 2px;
        border-radius: 18px;
        transition: color 0.25s ease;
        position: relative;
        z-index: 1;
        gap: 1px;
        font-weight: 500;
        min-width: 0;
    }

    .nav-item .nav-icon {
        width: 20px;
        height: 20px;
        display: block;
        position: relative;
        z-index: 2;
    }

    .nav-item .nav-icon svg {
        width: 20px;
        height: 20px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .nav-item .nav-label {
        font-size: 8px;
        font-weight: 500;
        letter-spacing: 0.2px;
        opacity: 0.6;
    }

    .nav-item.active {
        color: var(--primary);
    }

    .nav-item.active .nav-label {
        color: var(--primary);
        opacity: 0.9;
        font-weight: 600;
    }

    .nav-item:active {
        transform: scale(0.95);
    }

            /* Desktop Sidebar */
            .desktop-nav {
                display: none;
            }

            @media (min-width: 1024px) {
                .desktop-nav {
                    display: flex;
                    position: fixed;
                    left: 0;
                    top: 0;
                    bottom: 0;
                    width: 280px;
                    background: var(--nav-bg);
                    backdrop-filter: blur(40px) saturate(200%) brightness(1.15);
                    -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(1.15);
                    border-right: 1px solid var(--nav-border);
                    flex-direction: column;
                    padding: 32px 20px;
                    gap: 8px;
                    z-index: 999;
                    box-shadow: 4px 0 30px var(--nav-shadow);
                }

                .desktop-nav-header {
                    font-size: 28px;
                    font-weight: 700;
                    margin-bottom: 32px;
                    padding: 12px 16px;
                    letter-spacing: -1px;
                    color: var(--primary);
                }

                .desktop-nav-item {
                    display: flex;
                    align-items: center;
                    gap: 14px;
                    padding: 14px 18px;
                    border-radius: 14px;
                    background: transparent;
                    border: none;
                    color: var(--text);
                    cursor: pointer;
                    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                    font-size: 15px;
                    font-weight: 500;
                    position: relative;
                }

                .desktop-nav-item:hover {
                    background: rgba(255,255,255,0.08);
                    transform: translateX(4px);
                }

                .desktop-nav-item.active {
                    background: var(--primary-dim);
                    color: var(--primary);
                    box-shadow: 0 4px 16px rgba(153,51,204,0.15);
                }

                .desktop-nav-item .nav-icon { font-size: 22px; }

                .desktop-nav-settings {
                    margin-top: auto;
                    border-top: 1px solid var(--nav-border);
                    padding-top: 16px;
                }

                .desktop-nav-item.settings-item {
                    width: 100%;
                }
            }

            /* === CARDS === */
            .card {
                background: var(--card);
                backdrop-filter: blur(var(--glass-blur)) saturate(180%);
                -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
                border: 1px solid var(--glass-tint);
                border-radius: 20px;
                padding: 16px;
                margin-bottom: 15px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                transition: all 0.3s;
            }

            /* === DATE NAVIGATION === */
            .date-nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px;
                padding: 4px;
            }

            .date-nav-btn {
                background: var(--card);
                border: 1px solid var(--glass-tint);
                border-radius: 50%;
                width: 44px;
                height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 18px;
                color: var(--text);
                transition: all 0.2s;
                flex-shrink: 0;
            }

            .date-nav-btn:active {
                transform: scale(0.88);
                background: var(--primary-dim);
            }

            .date-display {
                text-align: center;
                flex: 1;
                padding: 0 8px;
            }

            .date-display .day-name {
                font-size: 17px;
                font-weight: 700;
                display: block;
            }

            .date-display .day-date {
                font-size: 13px;
                color: var(--gray);
                display: block;
                margin-top: 2px;
            }

            .today-badge {
                display: inline-block;
                background: var(--primary);
                color: white;
                font-size: 10px;
                padding: 2px 8px;
                border-radius: 10px;
                font-weight: 600;
                margin-left: 6px;
            }

            /* === PLAN FORM === */
            .plan-form { padding: 4px 0; }

            .plan-form label {
                font-size: 13px;
                font-weight: 600;
                color: var(--gray);
                display: block;
                margin: 12px 0 4px 0;
            }

            .plan-form input,
            .plan-form select,
            .plan-form textarea {
                width: 100%;
                padding: 12px;
                border: 1px solid var(--glass-tint);
                border-radius: 12px;
                font-size: 15px;
                margin-bottom: 4px;
                background: rgba(255,255,255,0.5);
                color: var(--text);
                transition: all 0.2s;
            }

            html.dark-mode .plan-form input,
            html.dark-mode .plan-form select,
            html.dark-mode .plan-form textarea {
                background: rgba(30,30,30,0.5);
            }

            .plan-form input:focus,
            .plan-form select:focus,
            .plan-form textarea:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px var(--primary-dim);
            }

            .mensa-row {
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 8px 0;
                padding: 8px 0;
            }

            .mensa-row input[type="checkbox"] {
                width: 20px;
                height: 20px;
                accent-color: var(--primary);
                margin: 0;
            }

            .mensa-row select {
                flex: 1;
                padding: 8px 12px;
                border: 1px solid var(--glass-tint);
                border-radius: 10px;
                font-size: 13px;
                background: rgba(255,255,255,0.5);
                color: var(--text);
            }

            .btn {
                background: var(--primary);
                color: white;
                border: none;
                padding: 14px;
                border-radius: 12px;
                width: 100%;
                font-weight: 700;
                font-size: 16px;
                cursor: pointer;
                transition: 0.2s;
                box-shadow: 0 4px 15px rgba(153,51,204,0.3);
            }

            .btn:active {
                opacity: 0.85;
                transform: scale(0.98);
            }

            .btn-small {
                padding: 8px 14px;
                font-size: 13px;
                width: auto;
                border-radius: 10px;
            }

            .status-message {
                display: none;
                padding: 10px 12px;
                margin-bottom: 12px;
                border-radius: 12px;
                font-size: 14px;
                line-height: 1.4;
            }

            .status-message.show { display: block; }
            .status-success { background: #d4f0ff; color: #003c72; }
            .status-error { background: #ffe5e5; color: #8b0000; }

            /* === ANSTEHEND === */
            .anstehend-section { margin-top: 20px; }

            .anstehend-header {
                font-size: 16px;
                font-weight: 700;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .anstehend-item {
                display: flex;
                align-items: center;
                padding: 12px 14px;
                border-radius: 14px;
                margin-bottom: 8px;
                background: var(--card);
                border: 1px solid var(--glass-tint);
                transition: all 0.2s;
                cursor: pointer;
                gap: 12px;
            }

            .anstehend-item:active {
                transform: scale(0.97);
            }

            .anstehend-item.today {
                border-left: 4px solid var(--primary);
                background: var(--primary-dim);
            }

            .anstehend-date {
                display: flex;
                flex-direction: column;
                align-items: center;
                min-width: 48px;
                gap: 2px;
            }

            .anstehend-date .day-num {
                font-size: 20px;
                font-weight: 700;
                line-height: 1;
            }

            .anstehend-date .day-label {
                font-size: 11px;
                color: var(--gray);
                text-transform: uppercase;
                font-weight: 600;
            }

            .anstehend-info {
                flex: 1;
                min-width: 0;
            }

            .anstehend-info .meal-name {
                font-size: 14px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .anstehend-info .meal-meta {
                font-size: 12px;
                color: var(--gray);
                margin-top: 2px;
            }

            .anstehend-empty {
                text-align: center;
                padding: 30px 20px;
                color: var(--gray);
                font-size: 14px;
            }

            /* === CALENDAR === */
            .calendar-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 20px;
                padding: 4px 0;
            }

            .calendar-header h2 {
                font-size: 22px;
                font-weight: 700;
                margin: 0;
                letter-spacing: -0.5px;
            }

            .calendar-nav-btn {
                background: var(--card);
                border: 1px solid var(--glass-tint);
                border-radius: 50%;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 16px;
                color: var(--text);
                transition: all 0.2s;
            }

            .calendar-nav-btn:active {
                transform: scale(0.88);
                background: var(--primary-dim);
            }

            .calendar-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
            }

            .calendar-weekday {
                text-align: center;
                font-size: 12px;
                font-weight: 600;
                color: var(--gray);
                padding: 8px 0;
                text-transform: uppercase;
            }

            .calendar-day {
                aspect-ratio: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                border-radius: 14px;
                cursor: pointer;
                transition: all 0.2s;
                font-size: 15px;
                font-weight: 500;
                position: relative;
                gap: 2px;
                border: none;
                background: transparent;
                color: var(--text);
                padding: 0;
                width: 100%;
            }

            .calendar-day:active {
                transform: scale(0.88);
            }

            .calendar-day.other-month {
                color: var(--gray);
                opacity: 0.4;
            }

            .calendar-day.today {
                background: var(--primary);
                color: white;
                font-weight: 700;
                box-shadow: 0 4px 12px rgba(153,51,204,0.3);
            }

            .calendar-day.selected {
                background: var(--primary-dim);
                color: var(--primary);
                font-weight: 700;
            }

            .calendar-day .meal-dot {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--primary);
                position: absolute;
                bottom: 6px;
            }

            .calendar-day.today .meal-dot {
                background: white;
            }

            .calendar-legend {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 16px;
                margin-top: 16px;
                font-size: 13px;
                color: var(--gray);
            }

            .calendar-legend .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--primary);
                display: inline-block;
                margin-right: 4px;
            }

            .calendar-week-day {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 12px 8px;
                border-radius: 16px;
                cursor: pointer;
                transition: all 0.2s;
                border: none;
                background: var(--card-bg);
                color: var(--text);
                width: 100%;
                min-height: 100px;
            }

            .calendar-week-day:active {
                transform: scale(0.95);
            }

            .calendar-week-day.today {
                background: var(--primary);
                color: white;
                box-shadow: 0 4px 12px rgba(153,51,204,0.3);
            }

            .calendar-week-day.selected {
                background: var(--primary-dim);
                color: var(--primary);
                font-weight: 700;
            }

            .calendar-week-day .week-day-name {
                font-size: 12px;
                font-weight: 600;
                text-transform: uppercase;
                opacity: 0.7;
            }

            .calendar-week-day .week-day-num {
                font-size: 20px;
                font-weight: 700;
            }

            .calendar-week-day .week-day-meal {
                font-size: 11px;
                text-align: center;
                opacity: 0.9;
                background: rgba(255,255,255,0.1);
                padding: 2px 8px;
                border-radius: 6px;
                max-width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .calendar-week-day.today .week-day-meal {
                background: rgba(255,255,255,0.2);
            }

            /* === MODAL === */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2000;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
                padding: 24px;
            }

            .modal-overlay.open {
                opacity: 1;
                pointer-events: auto;
            }

            .modal-content {
                background: var(--card);
                backdrop-filter: blur(40px) saturate(200%);
                -webkit-backdrop-filter: blur(40px) saturate(200%);
                border: 1px solid var(--glass-tint);
                border-radius: 24px;
                width: 100%;
                max-width: 400px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                animation: modalSlideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
                overflow: hidden;
            }

            @keyframes modalSlideUp {
                from { transform: translateY(40px) scale(0.95); opacity: 0; }
                to { transform: translateY(0) scale(1); opacity: 1; }
            }

            .modal-header {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 18px 20px 0;
            }

            .modal-close {
                margin-left: auto;
                background: none;
                border: none;
                color: var(--gray);
                font-size: 20px;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 8px;
                transition: 0.2s;
            }

            .modal-close:hover {
                background: rgba(255,255,255,0.1);
            }

            .modal-body {
                padding: 16px 20px 20px;
            }

            /* === SETTINGS === */
            .settings-section { margin-bottom: 24px; }

            .settings-section h3 {
                font-size: 14px;
                font-weight: 600;
                color: var(--gray);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin: 0 0 12px 0;
            }

            .theme-toggle {
                display: flex;
                gap: 8px;
            }

            .theme-btn {
                flex: 1;
                padding: 12px;
                border: 2px solid var(--glass-tint);
                background: rgba(255,255,255,0.3);
                color: var(--text);
                border-radius: 12px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                transition: all 0.2s;
            }

            .theme-btn.active {
                background: var(--primary);
                border-color: var(--primary);
                color: white;
                box-shadow: 0 4px 15px rgba(153,51,204,0.3);
            }

            .danger-btn {
                background: rgba(255,59,48,0.12);
                color: var(--danger);
                border: 1px solid rgba(255,59,48,0.3);
                padding: 12px 16px;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                width: 100%;
                transition: all 0.2s;
            }

            .danger-btn:active {
                transform: scale(0.97);
            }

            .settings-footer {
                font-size: 12px;
                color: var(--gray);
                text-align: center;
                padding: 20px 0;
                line-height: 1.6;
            }

            /* === MEDIA QUERIES === */
            @media (min-width: 1024px) {
                h1 { font-size: 40px !important; margin-bottom: 32px !important; }
            }
        </style>
    </head>
    <body>
        <!-- Desktop Sidebar -->
        <nav class="desktop-nav">
            <div class="desktop-nav-header">cook_now</div>
            <button class="desktop-nav-item active" onclick="showTab('home', this, true)">

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

                onSnapshot,

                getDocs,
                deleteDoc,
                query,
                orderBy,
                startAt,
                endAt,
                enableIndexedDbPersistence,
            } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

            const firebaseConfig = {
                apiKey: "AIzaSyAySiMGc3vbfkPwLTuLFnMRdZsBSLvZ1p8",
                authDomain: "cooking-plan-12404.firebaseapp.com",
                projectId: "cooking-plan-12404",

                appId: "1:64677458838:web:b42984472bd2dd1402acb7",
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            enableIndexedDbPersistence(db).catch((err) => {
                if (err.code === 'failed-precondition') {
                    console.warn('Firestore persistence: multiple tabs open');
                } else if (err.code === 'unimplemented') {
                    console.warn('Firestore persistence not supported');
                }
            });

            // === STATE ===
            let selectedDate = new Date();
            let calendarMonth = new Date();
            let calendarYear = calendarMonth.getFullYear();
            let calendarMonthIdx = calendarMonth.getMonth();
            let mealCache = {};
            let allMealDates = new Set();
            let calendarView = 'month';
            let userName = localStorage.getItem('cook-now-user-name') || '';
            let currentTab = 'home';

            const weekdays = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
            const weekdayNames = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
            const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];

            function formatDateKey(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function formatDisplayDate(date) {
                return date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
            }

            function isToday(date) {
                const t = new Date();
                return date.getFullYear() === t.getFullYear() && date.getMonth() === t.getMonth() && date.getDate() === t.getDate();
            }

            function formatDateShort(date) {
                return date.toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit" });
            }

            // === TAB NAVIGATION ===
            window.showTab = (id, btn, isDesktop) => {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.querySelectorAll('.nav-item, .desktop-nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('view-' + id).classList.remove('hidden');
                btn.classList.add('active');
                currentTab = id;

                if (id === 'home') {
                    updateGreeting();
                    updateTodaySection();
                    updateDateDisplay();
                    loadMealForDate();
                    renderAnstehend();
                    renderSpeiseplaene();
                }
                if (id === 'calendar') {
                    renderCalendar();
                    renderSpeiseplaene();
                }

                // Update sliding pill position for mobile nav
                const nav = document.getElementById('mobile-nav');
                const pill = document.getElementById('nav-pill');
                if (nav && pill && !isDesktop && btn.classList.contains('nav-item')) {
                    const tabsEl = btn.closest('.nav-tabs');
                    if (tabsEl) {
                        const tabsRect = tabsEl.getBoundingClientRect();
                        const btnRect = btn.getBoundingClientRect();
                        const left = btnRect.left - tabsRect.left;
                        pill.style.width = btnRect.width + 'px';
                        pill.style.transform = 'translateX(' + left + 'px)';
                    }
                }
            };

            window.openEditModal = (btn) => {
                document.getElementById('plan-date').value = formatDateKey(selectedDate);
                document.getElementById('modal-title').textContent = 'Mahlzeit: ' + formatDisplayDate(selectedDate);
                document.getElementById('meal-modal').classList.add('open');
                setTimeout(() => document.getElementById('plan-dish').focus(), 200);
            };

            window.closeEditModal = (e) => {
                if (e && e.target !== e.currentTarget) return;
                document.getElementById('meal-modal').classList.remove('open');
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeEditModal();
            });

            function updateMealCardSummary() {
                const el = document.getElementById('meal-card-summary');
                if (!el) return;
                const dish = document.getElementById('plan-dish');
                const mensa = document.getElementById('plan-mensa');
                const mensaType = document.getElementById('plan-mensa-type');
                const notes = document.getElementById('plan-notes');
                if (mensa.checked) {
                    const t = mensaType.value === 'bruecke' || mensaType.value === 'kirche' ? 'Kirche' : mensaType.value === 'fleet' ? 'Fleet' : mensaType.value === 'bread-soda' ? 'Bread & Soda' : 'Mensa';
                    el.innerHTML = `<span style="color:var(--primary);font-weight:600;">🍽️ Mensa (${t})</span>${notes.value.trim() ? ' <span style="font-size:12px;color:var(--gray);">📝</span>' : ''}`;
                } else if (dish.value.trim()) {
                    el.innerHTML = '🍽️ ' + dish.value.trim() + (notes.value.trim() ? ' <span style="font-size:12px;color:var(--gray);">📝</span>' : '');
                } else {
                    el.textContent = 'Keine Mahlzeit geplant — tippen zum Hinzufügen';
                }
            }

            // === HOME: MEAL PLAN ===
            window.toggleMensa = () => {
                const cb = document.getElementById('plan-mensa');
                const sel = document.getElementById('plan-mensa-type');
                sel.style.display = cb.checked ? 'inline-block' : 'none';
                if (!cb.checked) sel.value = '';
            };

            async function loadMealForDate() {
                const dateKey = formatDateKey(selectedDate);
                const snap = await getDoc(doc(db, "meals", dateKey));
                const dish = document.getElementById('plan-dish');
                const mensa = document.getElementById('plan-mensa');
                const mensaType = document.getElementById('plan-mensa-type');
                const notes = document.getElementById('plan-notes');

                if (snap.exists()) {
                    const data = snap.data();
                    dish.value = data.dish || '';
                    mensa.checked = data.mensa || false;
                    mensaType.value = data.mensaType || '';
                    notes.value = data.notes || '';
                } else {
                    dish.value = '';
                    mensa.checked = false;
                    mensaType.value = '';
                    notes.value = '';
                }
                toggleMensa();
                updateMealCardSummary();
            }

            window.saveMeal = async () => {
                if (!navigator.onLine) {
                    showStatus('home', 'Verbinde dich mit dem Internet um diese Funktion zu nutzen', 'error');
                    return;
                }
                const dateVal = document.getElementById('plan-date').value;
                if (dateVal) {
                    const parts = dateVal.split('-');
                    selectedDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                }
                const dateKey = formatDateKey(selectedDate);
                const data = {
                    dish: document.getElementById('plan-dish').value.trim(),
                    mensa: document.getElementById('plan-mensa').checked,
                    mensaType: document.getElementById('plan-mensa-type').value,
                    notes: document.getElementById('plan-notes').value.trim(),
                };

                if (!data.dish && !data.mensa) {
                    await deleteDoc(doc(db, "meals", dateKey)).catch(() => {});
                    showStatus('home', 'Eintrag entfernt.', 'success');
                } else {
                    await setDoc(doc(db, "meals", dateKey), data);
                    showStatus('home', 'Gespeichert für ' + formatDisplayDate(selectedDate), 'success');
                }
                closeEditModal();
                updateMealCardSummary();
                renderAnstehend();
                renderCalendar();
                updateDateDisplay();
            };

            window.deleteMeal = async () => {
                if (!navigator.onLine) {
                    showStatus('home', 'Verbinde dich mit dem Internet um diese Funktion zu nutzen', 'error');
                    return;
                }
                if (!confirm('Mahlzeit wirklich löschen?')) return;
                const dateKey = formatDateKey(selectedDate);
                await deleteDoc(doc(db, "meals", dateKey)).catch(() => {});
                document.getElementById('plan-dish').value = '';
                document.getElementById('plan-mensa').checked = false;
                document.getElementById('plan-mensa-type').value = '';
                document.getElementById('plan-notes').value = '';
                closeEditModal();
                updateMealCardSummary();
                showStatus('home', 'Eintrag entfernt.', 'success');
                renderAnstehend();
                renderCalendar();
            };

            // === HOME: ANSTEHEND ===
            async function renderAnstehend() {
                const container = document.getElementById('anstehend-list');
                const days = [];
                const today = new Date();
                today.setHours(0,0,0,0);

                for (let i = 0; i < 14; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    days.push(d);
                }

                const mealPromises = days.map(d => {
                    const key = formatDateKey(d);
                    return getDoc(doc(db, "meals", key)).then(snap => ({ date: d, data: snap.exists() ? snap.data() : null }));
                });

                const meals = await Promise.all(mealPromises);
                const hasMeals = meals.some(m => m.data);

                if (!hasMeals) {
                    container.innerHTML = `<div class="anstehend-empty">Keine Mahlzeiten geplant.<br>Tippe auf einen Tag oben und plane deine nächste Mahlzeit!</div>`;
                    return;
                }

                container.innerHTML = meals.filter(m => m.data).map(m => {
                    const isTodayFlag = isToday(m.date);
                    const dayNum = m.date.getDate();
                    const dayLabel = weekdays[m.date.getDay()];
                    const dateStr = formatDisplayDate(m.date);
                    const mealName = m.data.mensa ? (m.data.mensaType === 'bruecke' || m.data.mensaType === 'kirche' ? '🍽️ Mensa (Kirche)' : m.data.mensaType === 'fleet' ? '🍽️ Mensa (Fleet)' : m.data.mensaType === 'bread-soda' ? '🥖🥤 Bread & Soda' : '🍽️ Mensa') : (m.data.dish || '🍽️ Eingetragen');
                    const hasIngredients = m.data.ing && m.data.ing.trim();
                    const hasNotes = m.data.notes && m.data.notes.trim();

                    return `<div class="anstehend-item ${isTodayFlag ? 'today' : ''}" onclick="selectAnstehendDate('${formatDateKey(m.date)}')">
                        <div class="anstehend-date">
                            <span class="day-num">${dayNum}</span>
                            <span class="day-label">${dayLabel}</span>
                        </div>
                        <div class="anstehend-info">
                            <div class="meal-name">${mealName}${hasNotes ? ' 📝' : ''}</div>
                            <div class="meal-meta">${dateStr}${hasIngredients ? ' · 🥕 Zutaten' : ''}</div>
                        </div>
                        <span style="font-size:12px;color:var(--gray);">›</span>
                    </div>`;
                }).join('');
            }

            window.selectAnstehendDate = (dateKey) => {
                const parts = dateKey.split('-');
                selectedDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                openEditModal();
            };

            // === CALENDAR ===
            function renderCalendar() {
                if (calendarView === 'week') {
                    renderCalendarWeek();
                    return;
                }
                const grid = document.getElementById('calendar-grid');
                const label = document.getElementById('calendar-month-label');

                const year = calendarMonth.getFullYear();
                const month = calendarMonth.getMonth();
                label.innerText = `${monthNames[month]} ${year}`;

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const today = new Date();

                let html = '';
                weekdays.forEach(d => { html += `<div class="calendar-weekday">${d}</div>`; });

                for (let i = 0; i < firstDay; i++) {
                    html += `<div></div>`;
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const dateKey = formatDateKey(date);
                    const isTodayFlag = isToday(date);
                    const hasMeal = allMealDates.has(dateKey);
                    const isSelected = date.getFullYear() === selectedDate.getFullYear() && date.getMonth() === selectedDate.getMonth() && date.getDate() === selectedDate.getDate();

                    html += `<button class="calendar-day ${isTodayFlag ? 'today' : ''} ${isSelected ? 'selected' : ''}" onclick="selectCalendarDay('${dateKey}')">
                        ${d}${hasMeal ? '<span class="meal-dot"></span>' : ''}
                    </button>`;
                }

                grid.innerHTML = html;
                updateCalendarDayDetail();
            }

            window.setCalendarView = (view) => {
                calendarView = view;
                document.getElementById('view-month-btn').style.background = view === 'month' ? 'var(--primary)' : 'var(--card-bg)';
                document.getElementById('view-month-btn').style.color = view === 'month' ? 'white' : 'var(--text)';
                document.getElementById('view-week-btn').style.background = view === 'week' ? 'var(--primary)' : 'var(--card-bg)';
                document.getElementById('view-week-btn').style.color = view === 'week' ? 'white' : 'var(--text)';
                renderCalendar();
            };

            // Week view state
            let calendarWeekStart = new Date();
            (function initWeekStart() {
                const d = new Date();
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                calendarWeekStart = new Date(d.setDate(diff));
                calendarWeekStart.setHours(0,0,0,0);
            })();

            async function renderCalendarWeek() {
                const grid = document.getElementById('calendar-grid');
                const label = document.getElementById('calendar-month-label');
                const weekStart = new Date(calendarWeekStart);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                label.innerText = `${weekStart.toLocaleDateString("de-DE", {day:"numeric", month:"long"})} – ${weekEnd.toLocaleDateString("de-DE", {day:"numeric", month:"long", year:"numeric"})}`;
                const today = new Date();
                today.setHours(0,0,0,0);
                let html = '';
                for (let i = 0; i < 7; i++) {
                    const d = new Date(weekStart);
                    d.setDate(weekStart.getDate() + i);
                    const dateKey = formatDateKey(d);
                    const isTodayFlag = d.getTime() === today.getTime();
                    const isSelected = d.getTime() === new Date(selectedDate).setHours(0,0,0,0);
                    const dayName = weekdays[d.getDay()];
                    let mealLabel = '';
                    let mealType = '';
                    if (allMealDates.has(dateKey)) {
                        const snap = await getDoc(doc(db, "meals", dateKey));
                        if (snap.exists()) {
                            const data = snap.data();
                            if (data.mensa) {
                                mealType = 'mensa';
                                const t = data.mensaType === 'bruecke' || data.mensaType === 'kirche' ? 'Kirche' : data.mensaType === 'fleet' ? 'Fleet' : data.mensaType === 'bread-soda' ? 'B&S' : 'Mensa';
                                mealLabel = t;
                            } else {
                                mealType = 'dish';
                                mealLabel = data.dish || 'Eingetragen';
                            }
                        }
                    }
                    html += `<button class="calendar-week-day ${isTodayFlag ? 'today' : ''} ${isSelected ? 'selected' : ''}" onclick="selectCalendarDay('${dateKey}')">
                        <span class="week-day-name">${dayName}</span>
                        <span class="week-day-num">${d.getDate()}</span>
                        <span class="week-day-meal ${mealType}">${mealLabel || '—'}</span>
                    </button>`;
                }
                html += `<div style="grid-column:1/-1;display:flex;gap:6px;justify-content:center;margin-top:8px;">
                    <button class="btn-small" onclick="navigateWeek(-1)" style="flex:1;">‹ Vorwoche</button>
                    <button class="btn-small" onclick="navigateWeek(1)" style="flex:1;">Nächste Woche ›</button>
                </div>`;
                grid.innerHTML = html;
                updateCalendarDayDetail();
            }

            window.navigateWeek = (delta) => {
                calendarWeekStart.setDate(calendarWeekStart.getDate() + delta * 7);
                calendarWeekStart = new Date(calendarWeekStart);
                renderCalendar();
                loadAllMealDates();
                renderSpeiseplaene();
            };

            window.navigateMonth = (delta) => {
                calendarMonth.setMonth(calendarMonth.getMonth() + delta);
                calendarMonth = new Date(calendarMonth);
                renderCalendar();
                loadAllMealDates();
                renderSpeiseplaene();
            };

            window.selectCalendarDay = (dateKey) => {
                const parts = dateKey.split('-');
                selectedDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                renderCalendar();
                updateCalendarDayDetail();
            };

            async function updateCalendarDayDetail() {
                const container = document.getElementById('calendar-day-detail');
                const label = document.getElementById('calendar-day-plans-label');
                const dateKey = formatDateKey(selectedDate);
                const snap = await getDoc(doc(db, "meals", dateKey));

                const dayName = weekdayNames[selectedDate.getDay()];
                const dateStr = formatDisplayDate(selectedDate);
                label.innerText = `${dayName}, ${dateStr}`;

                if (snap.exists()) {
                    const data = snap.data();
                    if (data.mensa) {
                        const typeLabel = (data.mensaType === 'bruecke' || data.mensaType === 'kirche') ? 'Kirche' : data.mensaType === 'fleet' ? 'Fleet' : data.mensaType === 'bread-soda' ? 'Bread & Soda' : 'Mensa';
                        container.innerHTML = `<div style="padding:12px;background:var(--primary-dim);border-radius:12px;">
                            <div style="font-weight:600;">🍽️ Mensa (${typeLabel})</div>
                            ${data.dish ? `<div style="font-size:13px;color:var(--gray);margin-top:4px;">${data.dish}</div>` : ''}
                            ${data.notes ? `<div style="font-size:12px;color:var(--gray);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.1);">📝 ${data.notes}</div>` : ''}
                        </div>`;
                    } else {
                        container.innerHTML = `<div style="padding:12px;background:var(--primary-dim);border-radius:12px;">
                            ${data.dish ? `<div style="font-weight:600;">${data.dish}</div>` : ''}
                            ${data.ing ? `<div style="font-size:13px;color:var(--gray);margin-top:4px;">🥕 ${data.ing}</div>` : ''}
                            ${data.url ? `<div style="margin-top:6px;"><a href="${data.url}" target="_blank" style="color:var(--primary);font-size:13px;text-decoration:none;">🔗 Rezept öffnen</a></div>` : ''}
                            ${data.notes ? `<div style="font-size:12px;color:var(--gray);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.1);">📝 ${data.notes}</div>` : ''}
                        </div>`;
                    }
                } else {
                    container.innerHTML = `<div style="text-align:center;padding:20px;color:var(--gray);font-size:14px;">Keine Mahlzeit geplant</div>`;
                }
            }

            async function loadAllMealDates() {
                const snap = await getDocs(collection(db, "meals"));
                allMealDates = new Set();
                snap.forEach(d => allMealDates.add(d.id));
                renderCalendar();
            }

            function getCurrentWeekNumber(date) {
                const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                const dayNum = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
            }

            function renderSpeiseplaene() {
                const calContainer = document.getElementById('speiseplaene-links');
                const homeContainer = document.getElementById('home-speiseplaene-links');
                if (!calContainer && !homeContainer) return;
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const week = getCurrentWeekNumber(now);
                const yearShort = String(year).slice(-2);

                const mensas = [
                    { id: 'kirche', label: 'Kirche', url: `https://www.bruecke-sh.de/wp-content/uploads/${year}/${month}/Speiseplan-KW${week}-${yearShort}.pdf` },
                    { id: 'fleet', label: 'Fleet', url: `https://www.bruecke-sh.de/wp-content/uploads/${year}/${month}/fleet-KW${week}.pdf` },
                    { id: 'bread-soda', label: 'Bread & Soda', url: `https://meineschulmahlzeit.de` },
                ];

                const html = mensas.map(m => `
                    <a href="${m.url}" target="_blank" rel="noopener noreferrer" style="display:flex; align-items:center; gap:10px; padding:12px 14px; margin-bottom:8px; border-radius:12px; text-decoration:none; background:rgba(255,255,255,0.05); border:1px solid var(--glass-tint); color:var(--text); transition:all 0.2s;">
                        <span style="font-size:20px;">📄</span>
                        <div style="flex:1;">
                            <div style="font-weight:600; font-size:14px;">${m.label}</div>
                            <div style="font-size:12px; color:var(--gray);">${m.id === 'bread-soda' ? 'Menü online ansehen' : `KW ${week} · PDF öffnen`}</div>
                        </div>
                        <span style="font-size:14px; color:var(--gray);">↗</span>
                    </a>
                `).join('') || '<div style="text-align:center;padding:12px;color:var(--gray);font-size:13px;">Keine Speisepläne verfügbar</div>';
                if (calContainer) calContainer.innerHTML = html;
                if (homeContainer) homeContainer.innerHTML = html;
            }

            // === SETTINGS ===
            function loadTheme() {
                const saved = localStorage.getItem("cook-now-theme") || "auto";
                setTheme(saved);
                const nameEl = document.getElementById('settings-name');
                if (nameEl) nameEl.value = userName;
                updateGreeting();
            }

            window.saveUserName = () => {
                const val = document.getElementById('settings-name').value.trim();
                userName = val;
                localStorage.setItem('cook-now-user-name', val);
                updateGreeting();
            };

            function updateDateDisplay() {}

            function updateGreeting() {
                const el = document.getElementById('home-greeting');
                if (!el) return;
                const h = new Date().getHours();
                let greeting = 'Guten Abend';
                if (h < 12) greeting = 'Guten Morgen';
                else if (h < 18) greeting = 'Guten Tag';
                else greeting = 'Guten Abend';
                el.textContent = greeting + (userName ? ', ' + userName : '') + '!';
            }

            async function updateTodaySection() {
                const today = new Date();
                const dateEl = document.getElementById('today-date');
                const weekdayEl = document.getElementById('today-weekday');
                const mealEl = document.getElementById('today-meal');
                if (!dateEl || !weekdayEl || !mealEl) return;
                dateEl.textContent = today.toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
                weekdayEl.textContent = weekdayNames[today.getDay()];
                const dateKey = formatDateKey(today);
                const snap = await getDoc(doc(db, "meals", dateKey));
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.mensa) {
                        const t = data.mensaType === 'bruecke' || data.mensaType === 'kirche' ? 'Kirche' : data.mensaType === 'fleet' ? 'Fleet' : data.mensaType === 'bread-soda' ? 'Bread & Soda' : 'Mensa';
                        mealEl.innerHTML = '🍽️ Mensa (' + t + ')' + (data.notes ? ' 📝' : '');
                    } else {
                        mealEl.innerHTML = '🍽️ ' + (data.dish || 'Eingetragen') + (data.notes ? ' 📝' : '');
                    }
                } else {
                    mealEl.textContent = '— Keine Mahlzeit geplant —';
                }
            }

            window.setTheme = (mode) => {
                localStorage.setItem("cook-now-theme", mode);
                const html = document.documentElement;
                if (mode === "auto") {
                    html.classList.remove("light-mode", "dark-mode");
                    if (window.matchMedia("(prefers-color-scheme: dark)").matches) html.classList.add("dark-mode");
                } else {
                    html.classList.remove("light-mode", "dark-mode");
                    html.classList.add(mode + "-mode");
                }
                document.getElementById("light-theme-btn").classList.toggle("active", mode === "light");
                document.getElementById("dark-theme-btn").classList.toggle("active", mode === "dark");
                document.getElementById("auto-theme-btn").classList.toggle("active", mode === "auto");
            };

            window.clearAllData = async () => {
                const confirmed = confirm(
                    "Alle lokalen Daten löschen?\n\n" +
                    "Folgendes wird entfernt:\n" +
                    "• Design-Einstellung\n" +
                    "• Benutzername\n" +
                    "• App-Cache\n\n" +
                    "Firebase-Daten (Mahlzeiten) bleiben erhalten."
                );
                if (!confirmed) return;
                ["cook-now-theme", "cook-now-user-name"].forEach(k => localStorage.removeItem(k));
                if ("caches" in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                if ("serviceWorker" in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(r => r.unregister()));
                }
                window.location.reload();
            };

            // === STATUS MESSAGE ===
            function showStatus(target, message, type = "success") {
                const element = document.getElementById(target + "-status");
                if (!element) return;
                element.innerText = message;
                element.className = `status-message show status-${type}`;
                setTimeout(() => { element.className = "status-message"; }, 3500);
            }

            // === SWIPE GESTURES ===
            let touchStartX = 0, touchStartY = 0;
            document.addEventListener("touchstart", (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            });

            document.addEventListener("touchend", (e) => {
                const deltaX = e.changedTouches[0].screenX - touchStartX;
                const deltaY = e.changedTouches[0].screenY - touchStartY;
                if (Math.abs(deltaX) > Math.abs(deltaY) * 1.8 && Math.abs(deltaX) > 60) {
                    const tabs = ['home', 'calendar', 'settings'];
                    const idx = tabs.indexOf(currentTab);
                    if (deltaX > 0 && idx > 0) {
                        const btn = document.querySelector(`[data-tab="${tabs[idx - 1]}"]`);
                        if (btn) showTab(tabs[idx - 1], btn);
                    } else if (deltaX < 0 && idx < tabs.length - 1) {
                        const btn = document.querySelector(`[data-tab="${tabs[idx + 1]}"]`);
                        if (btn) showTab(tabs[idx + 1], btn);
                    }
                }
            });

            // === FIREBASE LISTENERS ===
            function initListeners() {
                onSnapshot(collection(db, "meals"), () => {
                    loadAllMealDates();
                    if (currentTab === 'home') {
                        loadMealForDate();
                        renderAnstehend();
                        renderSpeiseplaene();
                        updateTodaySection();
                    }
                    if (currentTab === 'calendar') {
                        renderSpeiseplaene();
                    }
                });
            }

            // === MIGRATION: old week data → new date-based ===
            async function migrateOldData() {
                for (let week = 1; week <= 2; week++) {
                    const snap = await getDoc(doc(db, "plaene", "woche" + week));
                    if (snap.exists()) {
                        const monday = new Date();
                        const day = monday.getDay();
                        const mondayOffset = day === 0 ? -6 : 1 - day;
                        const weekMonday = new Date(monday);
                        weekMonday.setDate(monday.getDate() + mondayOffset + (week - 1) * 7);

                        const data = snap.data();
                        for (let i = 0; i < 5; i++) {
                            if (data[i] && (data[i].dish || data[i].ing || data[i].mensa)) {
                                const mealDate = new Date(weekMonday);
                                mealDate.setDate(weekMonday.getDate() + i);
                                const dateKey = formatDateKey(mealDate);
                                const existing = await getDoc(doc(db, "meals", dateKey));
                                if (!existing.exists()) {
                                    await setDoc(doc(db, "meals", dateKey), {
                                        dish: data[i].dish || '',
                                        ing: data[i].ing || '',
                                        url: data[i].url || '',
                                        mensa: data[i].mensa || false,
                                        mensaType: data[i].mensaType || '',
                                    });
                                }
                            }
                        }
                        console.log("Migrated week " + week);
                    }
                }
            }

            // === INIT ===
            loadTheme();
            initListeners();

            // Init pill position
            setTimeout(() => {
                const activeItem = document.querySelector('.nav-item.active');
                const pill = document.getElementById('nav-pill');
                if (pill && activeItem) {
                    const tabsEl = activeItem.closest('.nav-tabs');
                    if (tabsEl) {
                        const tabsRect = tabsEl.getBoundingClientRect();
                        const btnRect = activeItem.getBoundingClientRect();
                        const left = btnRect.left - tabsRect.left;
                        pill.style.width = btnRect.width + 'px';
                        pill.style.transform = 'translateX(' + left + 'px)';
                    }
                }
            }, 100);

            // Init calendar view buttons
            document.getElementById('view-month-btn').style.background = 'var(--primary)';
            document.getElementById('view-month-btn').style.color = 'white';
            document.getElementById('view-week-btn').style.background = 'var(--card-bg)';
            document.getElementById('view-week-btn').style.color = 'var(--text)';

            // Show calendar on first load, then load everything
            loadAllMealDates().then(() => {
                renderCalendar();
                migrateOldData().then(() => {
                    if (currentTab === 'home') {
                        updateDateDisplay();
                        loadMealForDate();
                        renderAnstehend();
                        renderSpeiseplaene();
                        updateTodaySection();
                    }
                });
            });

            // === SERVICE WORKER ===
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("./service-worker.js").then(reg => {
                        setInterval(() => reg.update(), 60000);
                        reg.addEventListener("updatefound", () => {
                            reg.installing.addEventListener("statechange", () => {
                                if (reg.installing.state === "installed" && navigator.serviceWorker.controller) {
                                    console.log("✓ New Service Worker available");
                                }
                            });
                        });
                    }).catch(err => console.log("SW registration failed:", err));
                });
            }

            // PWA Install
            let deferredPrompt;
            window.addEventListener("beforeinstallprompt", (e) => {
                e.preventDefault();
                deferredPrompt = e;
            });
            window.addEventListener("appinstalled", () => { deferredPrompt = null; });
        </script>
    </body>
</html>
